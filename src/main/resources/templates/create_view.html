<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bug Report</title>
    <link th:href="@{/css/style.css}" rel="stylesheet" />
</head>
<body>
    <nav><a th:href="@{/}">Go to List</a></nav>
    <h1>Create a bug report</h1>
<form th:action="@{/reports/add}" th:object="${bugForm}" method="post">
    <label for="title">Title</label>
    <input type="text" th:field="*{title}" id="title"></br>
    <label for="descr">Description</label>
    <input type="text" th:field="*{description}" id="descr"></br>
    <label for="prioselect">Priority</label>
    <select th:field="*{priority}" id="prioselect">
            <option th:each="prio : ${T(org.example.bugtrackerlabjuv25g.Priority).values()}"
                    th:value="${prio}" th:text="${prio}"></option>
    </select>
    <label for="dev_area">Development area</label>
    <select th:field="*{development}" id="dev_area">
        <option th:each="dev : ${T(org.example.bugtrackerlabjuv25g.Development).values()}"
                th:value="${dev}" th:text="${dev}"></option>
    </select>
    <button type="submit">Save</button>
</form>
</body>
</html>
