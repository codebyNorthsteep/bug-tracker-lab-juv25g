<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<table>
    <thead>
        <tr>
            <th>Id</th>
            <th>Title</th>
            <th>Description</th>
        </tr>
    </thead>
    <tbody>
    <tr th:if="${bugs.isEmpty()}">
        <td>No bugs found</td>
    </tr>
    <tr th:each="bug : ${bugs}">
        <td><span th:text="${bug.getId()}">Id</span></td>
        <td><span th:text="${bug.getTitle()}">Title</span></td>
        <td><span th:text="${bug.getDescription()}">Description</span></td>
    </tr>
    </tbody>
</table>
</body>
</html>
