<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bug Edit</title>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body>
<nav><a th:href="@{/}">Go to List</a></nav>
<h1>Edit a bug report</h1>
<form th:action="@{/bugdetails/edit/{id}(id=${bugForm.id()})}" th:object="${bugForm}" method="post">
    <input type="hidden" th:field="*{id}"/>
    <label for="title">Title</label>
    <input type="text" th:field="*{title}" id="title"><br/>
    <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error"></span>
    <label for="descr">Description</label>
    <input type="text" th:field="*{description}" id="descr"><br/>
    <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="error"></span>
    <label for="prioselect">Priority</label>
    <select th:field="*{priority}" id="prioselect">
        <option th:each="prio : ${T(org.example.bugtrackerlabjuv25g.Priority).values()}"
                th:value="${prio}" th:text="${prio}"></option>
    </select>
    <span th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}" class="error"></span>
    <label for="dev_area">Development area</label>
    <select th:field="*{development}" id="dev_area">
        <option th:each="dev : ${T(org.example.bugtrackerlabjuv25g.Development).values()}"
                th:value="${dev}" th:text="${dev}"></option>
    </select>
    <span th:if="${#fields.hasErrors('development')}" th:errors="*{development}" class="error"></span>
    <button type="submit">Update</button>
</form>
</body>
</html>
